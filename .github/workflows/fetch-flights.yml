name: Fetch Flight Status

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:          # Allow manual trigger from GitHub Actions tab
  push:
    paths:
      - 'flights.json'        # Also run when a flight is added/removed

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch flight data
        env:
          AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/fetch_flights.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update flight status [skip ci]'
          file_pattern: 'data/*.json'
          commit_user_name: 'Flighty Bot'
          commit_user_email: 'flighty-bot@users.noreply.github.com'
